{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mon profil</title>
  </head>
  <body>
    <h1>Modifier mon profil</h1>
    <form method="post">
      {% csrf_token %}
      <label> Email: <input type="email" name="email" value="{{ form.initial.email }}"/></label><br/>
      <label> Phone: <input type="text" name="phone" value="{{ form.initial.phone }}"/></label><br/>
      <label> Timezone: <input type="text" name="timezone" value="{{ form.initial.timezone }}"/></label><br/>
      <button type="submit">Enregistrer</button>
    </form>
    <p><a href="/admin/">Admin</a></p>
  </body>
</html>
